<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>videogenCN — 模型对比</title>
<style>
  :root {
    --bg: #f8f9fa; --card: #fff; --text: #212529; --muted: #6c757d;
    --border: #dee2e6; --accent: #2563eb; --tag-bg: #e9ecef;
    --bailian: #f97316; --jimeng: #8b5cf6; --minimax: #06b6d4; --hunyuan: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  header { text-align: center; padding: 40px 0 24px; }
  header h1 { font-size: 28px; font-weight: 700; }
  header p { color: var(--muted); margin-top: 4px; }
  .filters { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; align-items: center; }
  .filter-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-group-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; align-self: center; }
  .chip { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--card); transition: all .15s; user-select: none; }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff; }
  .badge-bailian { background: var(--bailian); }
  .badge-jimeng { background: var(--jimeng); }
  .badge-minimax { background: var(--minimax); }
  .badge-hunyuan { background: var(--hunyuan); }
  .provider-section { margin-bottom: 40px; }
  .provider-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
  .provider-header h2 { font-size: 20px; }
  .provider-header p { color: var(--muted); font-size: 13px; }
  .provider-count { font-size: 13px; color: var(--muted); margin-left: auto; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  th, td { padding: 10px 14px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--border); }
  th { background: #f1f3f5; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .3px; color: var(--muted); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8f9ff; }
  tr.default-model td { background: #fefce8; }
  tr.default-model:hover td { background: #fef9c3; }
  .default-star { color: var(--bailian); font-weight: 700; font-size: 16px; }
  .mode-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .mode-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; background: var(--tag-bg); }
  .feature-dot { display: inline-block; width: 18px; text-align: center; }
  .feature-yes { color: #16a34a; }
  .feature-no  { color: #d1d5db; }
  .feature-opt { color: var(--accent); font-size: 11px; }
  .exp-badge { font-size: 10px; background: #fef3c7; color: #92400e; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
  .price { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .use-case { max-width: 200px; color: var(--muted); font-size: 12px; }
  footer { text-align: center; padding: 32px; color: var(--muted); font-size: 12px; }
  footer a { color: var(--accent); }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; font-size: 12px; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .empty-state { text-align: center; padding: 60px; color: var(--muted); }
  @media (max-width: 768px) { .container { padding: 12px; } th, td { padding: 8px 10px; font-size: 12px; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>videogenCN 模型对比</h1>
    <p>4 大平台 · 20+ 模型 · 一键选择</p>
  </header>

  <div class="filters">
    <span class="filter-group-label">平台</span>
    <div class="filter-group" id="provider-filters"></div>
    <span class="filter-group-label" style="margin-left:12px">模式</span>
    <div class="filter-group" id="mode-filters"></div>
    <span class="filter-group-label" style="margin-left:12px">特性</span>
    <div class="filter-group" id="feature-filters"></div>
    <button class="chip" onclick="resetFilters()" style="margin-left:auto">重置</button>
  </div>

  <div class="legend">
    <div class="legend-item">⭐ = 该模式下的默认模型</div>
    <div class="legend-item"><span class="feature-yes">●</span> = 支持</div>
    <div class="legend-item"><span class="feature-no">●</span> = 不支持</div>
    <div class="legend-item"><span class="feature-opt">可选</span> = 开启后支持</div>
    <div class="legend-item"><span class="exp-badge">实验性</span> = API 可能变更</div>
  </div>

  <div id="content"></div>

  <footer>
    <p>数据来源：<a href="models.json">models.json</a> · 最后更新：<span id="last-updated"></span></p>
    <p>价格仅供参考，实际费用取决于分辨率和地域。请以各平台控制台为准。</p>
    <p><a href="https://github.com/Agents365-ai/videogenCN">videogenCN on GitHub</a></p>
  </footer>
</div>

<script>
// --- DATA -------------------------------------------------
const DATA_URL = 'models.json';
let providers = [];
let activeProviders = new Set();
let activeModes = new Set();
let activeFeature = null;

async function init() {
  const resp = await fetch(DATA_URL);
  const data = await resp.json();
  providers = data.providers;
  document.getElementById('last-updated').textContent = data.last_updated;
  buildFilters();
  resetFilters();
}

// --- FILTERS ----------------------------------------------
function buildFilters() {
  const allModes = new Set();
  providers.forEach(p => p.models.forEach(m => m.modes_en.forEach(x => allModes.add(x))));

  const pf = document.getElementById('provider-filters');
  providers.forEach(p => {
    const chip = document.createElement('span');
    chip.className = 'chip active';
    chip.dataset.provider = p.id;
    chip.textContent = p.name;
    chip.onclick = () => toggleProvider(p.id, chip);
    pf.appendChild(chip);
    activeProviders.add(p.id);
  });

  const mf = document.getElementById('mode-filters');
  [...allModes].sort().forEach(m => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.dataset.mode = m;
    chip.textContent = modeLabel(m);
    chip.onclick = () => toggleMode(m, chip);
    mf.appendChild(chip);
  });

  const ff = document.getElementById('feature-filters');
  const features = [
    {id: 'audio', label: '音频'},
    {id: 'camera_control', label: '镜头控制'},
    {id: 'multi_shot', label: '多镜头'},
  ];
  features.forEach(f => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.dataset.feature = f.id;
    chip.textContent = f.label;
    chip.onclick = () => toggleFeature(f.id, chip);
    ff.appendChild(chip);
  });
}

function modeLabel(m) { return {t2v:'文生视频', i2v:'图生视频', kf2v:'首尾帧', r2v:'参考生视频'}[m] || m; }

function toggleProvider(id, el) {
  if (activeProviders.has(id)) { activeProviders.delete(id); el.classList.remove('active'); }
  else { activeProviders.add(id); el.classList.add('active'); }
  render();
}
function toggleMode(m, el) {
  if (activeModes.has(m)) { activeModes.delete(m); el.classList.remove('active'); }
  else { activeModes.add(m); el.classList.add('active'); }
  render();
}
function toggleFeature(f, el) {
  if (activeFeature === f) { activeFeature = null; el.classList.remove('active'); }
  else {
    document.querySelectorAll('#feature-filters .chip').forEach(c => c.classList.remove('active'));
    activeFeature = f; el.classList.add('active');
  }
  render();
}
function resetFilters() {
  activeProviders = new Set(providers.map(p => p.id));
  activeModes = new Set();
  activeFeature = null;
  document.querySelectorAll('#provider-filters .chip').forEach(c => c.classList.add('active'));
  document.querySelectorAll('#mode-filters .chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('#feature-filters .chip').forEach(c => c.classList.remove('active'));
  render();
}

// --- RENDER -----------------------------------------------
function render() {
  const container = document.getElementById('content');
  let html = '';
  let totalVisible = 0;

  providers.forEach(p => {
    if (!activeProviders.has(p.id)) return;
    const models = p.models.filter(m => {
      if (activeModes.size > 0 && !m.modes_en.some(x => activeModes.has(x))) return false;
      if (activeFeature && !m[activeFeature]) return false;
      return true;
    });
    if (models.length === 0) return;
    totalVisible += models.length;

    html += `<div class="provider-section">
      <div class="provider-header">
        <span class="badge badge-${p.id}">${p.name}</span>
        <h2>${p.full_name}</h2>
        <p>${p.description}</p>
        <span class="provider-count">${models.length} 模型</span>
      </div>
      <div class="provider-meta" style="margin-bottom:12px;font-size:12px;color:var(--muted)">
        🔑 <code>${p.api_key_env}</code> · <a href="${p.api_key_url}" target="_blank">获取 Key</a> · 地域: ${p.region}
        ${p.region_note ? '<br>⚠️ ' + p.region_note : ''}
      </div>
      <table>
        <thead>
          <tr>
            <th>模型</th>
            <th>家族</th>
            <th>模式</th>
            <th>分辨率</th>
            <th>时长</th>
            <th>音频</th>
            <th>镜头</th>
            <th>多镜头</th>
            <th>参考价格</th>
            <th>推荐场景</th>
          </tr>
        </thead>
        <tbody>`;

    models.forEach(m => {
      const defaultClass = m.default ? ' class="default-model"' : '';
      const star = m.default ? ' <span class="default-star">⭐</span>' : '';
      html += `<tr${defaultClass}>
        <td><code>${m.name}</code>${star}${m.experimental ? '<span class="exp-badge">实验性</span>' : ''}</td>
        <td>${m.family}</td>
        <td><div class="mode-tags">${m.modes.map(x => `<span class="mode-tag">${x}</span>`).join('')}</div></td>
        <td>${m.resolution}</td>
        <td>${m.duration}</td>
        <td>${featIcon(m.audio)}</td>
        <td>${featIcon(m.camera_control)}</td>
        <td>${featIcon(m.multi_shot)}</td>
        <td class="price">${m.price}</td>
        <td class="use-case">${m.use_case}</td>
      </tr>`;
    });

    html += '</tbody></table></div>';
  });

  if (totalVisible === 0) {
    html = '<div class="empty-state"><p>没有匹配的模型。试试放宽筛选条件。</p></div>';
  }
  container.innerHTML = html;
}

function featIcon(val) {
  if (val === true) return '<span class="feature-dot feature-yes">●</span>';
  if (val === false) return '<span class="feature-dot feature-no">●</span>';
  if (typeof val === 'string') return `<span class="feature-opt">${val}</span>`;
  return '<span class="feature-dot feature-no">●</span>';
}

// --- INIT -------------------------------------------------
init();
</script>
</body>
</html>
